{% extends 'tickets/base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-5">
            <div class="card shadow-lg border-0" style="background-color: #1b1e2d; border-radius: 20px;">
                <div class="card-header bg-transparent border-0 text-center pt-5">
                    <div class="rounded-circle bg-primary bg-opacity-10 d-inline-flex p-3 mb-3">
                        <i class="bi bi-shield-lock text-primary fs-1"></i>
                    </div>
                    <h3 class="fw-bold text-white">ورود به پنل پشتیبانی</h3>
                    <p class="text-muted small">لطفاً نام کاربری و رمز عبور خود را وارد کنید</p>
                </div>

                <div class="card-body p-4 p-lg-5">
                    {% if form.errors %}
                        <div class="alert alert-danger border-0 small py-2" role="alert" style="background-color: rgba(220, 53, 69, 0.1); color: #ea868f;">
                            نام کاربری یا رمز عبور اشتباه است.
                        </div>
                    {% endif %}

                    <!-- اضافه کردن آدرس صریح برای جلوگیری از خطای CSRF -->
                    <form method="post" action="{% url 'login' %}" autocomplete="off">
                        {% csrf_token %}

                        <div class="mb-3 text-end">
                            <label for="id_username" class="form-label text-light small fw-bold">نام کاربری</label>
                            <input type="text" name="username" class="form-control bg-dark text-white border-secondary py-2" id="id_username" required placeholder="نام کاربری را وارد کنید">
                        </div>

                        <div class="mb-4 text-end">
                            <label for="id_password" class="form-label text-light small fw-bold">رمز عبور</label>
                            <input type="password" name="password" class="form-control bg-dark text-white border-secondary py-2" id="id_password" required placeholder="********">
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold py-2 shadow-sm" style="border-radius: 12px;">
                                ورود به حساب کاربری
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-footer bg-transparent border-top border-secondary text-center py-4">
                    <p class="mb-0 text-muted small">اکانت ندارید؟
                        <a href="{% url 'signup' %}" class="text-primary text-decoration-none fw-bold ms-1">ثبت‌نام و عضویت</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control:focus {
        background-color: #161926 !important;
        border-color: #6366f1 !important;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        color: white;
    }
    input::placeholder {
        color: #6c757d !important;
        font-size: 0.85rem;
    }
</style>
{% endblock %}

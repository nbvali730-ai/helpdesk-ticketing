<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت تیکت | پشتیبان</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-dark: #12141e;
            --card-dark: #1b1e2d;
            --sidebar-dark: #161926;
            --accent-color: #6366f1;
            --text-muted: #8a8d98;
            --border-color: #2d3142;
        }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* Sidebar */
        .sidebar {
            width: 260px; height: 100vh; position: fixed; right: 0; top: 0;
            background-color: var(--sidebar-dark); padding: 25px; border-left: 1px solid var(--border-color); z-index: 1000;
        }
        .nav-link {
            color: var(--text-muted); padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center;
            text-decoration: none;
        }
        .nav-link i { font-size: 1.2rem; margin-left: 12px; }
        .nav-link:hover, .nav-link.active { background: rgba(99, 102, 241, 0.1); color: var(--accent-color); }

        /* دکمه اختصاصی IT */
        .nav-link.it-panel { background: rgba(255, 193, 7, 0.1); color: #ffc107 !important; border: 1px solid rgba(255, 193, 7, 0.2); }
        .nav-link.it-panel:hover { background: rgba(255, 193, 7, 0.2); }

        /* Main Content */
        .main-content { margin-right: 260px; padding: 40px; min-height: 100vh; }
        .card-custom {
            background-color: var(--card-dark); border-radius: 20px; border: 1px solid var(--border-color); padding: 20px;
        }
        .search-box {
            background: var(--sidebar-dark); border: 1px solid var(--border-color); border-radius: 10px; color: white; padding: 8px 15px; width: 300px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="mb-5 text-end px-3">
        <h3 class="text-primary fw-bold"><i class="bi bi-cpu-fill"></i> پشتیبان</h3>
        <small class="text-muted">سیستم مدیریت تیکت</small>
    </div>

    <nav class="nav flex-column">
        <a class="nav-link active" href="{% url 'ticket_list' %}"><i class="bi bi-grid-1x2"></i> داشبورد</a>

        <!-- دکمه جدید مدیریت IT که اضافه شد -->
        <a class="nav-link it-panel" href="{% url 'it_ticket_list' %}">
            <i class="bi bi-shield-lock-fill"></i>
            <span class="fw-bold">مدیریت تیکت‌های IT</span>
        </a>

        <a class="nav-link" href="{% url 'ticket_list' %}"><i class="bi bi-ticket-detailed"></i> تیکت‌ها</a>
        <a class="nav-link" href="{% url 'ticket_create' %}"><i class="bi bi-plus-circle"></i> تیکت جدید</a>
        <a class="nav-link" href="#"><i class="bi bi-people"></i> مشتریان</a>

        <div class="mt-auto pt-5">
            <!-- تغییر از <a> به <form> برای ارسال درخواست POST -->
            <form method="post" action="{% url 'logout' %}" style="margin: 0;">
                {% csrf_token %}
                <button type="submit" class="nav-link text-danger" style="background: none; border: none; padding: 0; margin: 0; width: 100%; text-align: right; display: flex; align-items: center;">
                    <i class="bi bi-power" style="margin-left: 12px; font-size: 1.2rem;"></i> خروج
                </button>
            </form>
        </div>
    </nav>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div class="d-flex align-items-center">
            <input type="text" class="search-box me-3" placeholder="جستجو در تیکت‌ها...">
        </div>
        <div class="d-flex align-items-center">
            <div class="text-end me-3">
                <div class="fw-bold text-uppercase">{{ user.username }}</div>
                <small class="text-muted">مدیر سیستم</small>
            </div>
            <div class="rounded-circle bg-primary p-2" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-person-fill fs-4 text-white"></i>
            </div>
        </div>
    </div>

    {% block content %}{% endblock %}
</div>

</body>
</html>

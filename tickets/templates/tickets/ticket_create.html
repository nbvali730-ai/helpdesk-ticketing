{% extends 'tickets/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- کارت اصلی -->
            <div class="card shadow-lg border-0 bg-dark text-white" style="border-radius: 15px; overflow: hidden;">
                <!-- هدر کارت با آیکون -->
                <div class="card-header bg-primary text-center py-4">
                    <i class="fas fa-edit fa-3x mb-3"></i>
                    <h3 class="fw-bold">ثبت درخواست جدید</h3>
                    <p class="text-light opacity-75 small">مشکل خود را برای تیم IT بنویسید</p>
                </div>

                <div class="card-body p-4">
                    <form method="post" novalidate>
                        {% csrf_token %}

                        {% for field in form %}
                            <div class="mb-4">
                                <label class="form-label fw-bold text-info">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
                                {% endif %}
                            </div>
                        {% endfor %}

                        <!-- دکمه ارسال با استایل کامل -->
                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm py-3 fw-bold">
                                <i class="fas fa-paper-plane me-2"></i>
                                ارسال تیکت به واحد IT
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'ticket_list' %}" class="text-secondary text-decoration-none small">
                    <i class="fas fa-arrow-right me-1"></i> بازگشت به لیست تیکت‌ها
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    /* استایل‌های تکمیلی برای زیباتر شدن */
    .form-control, .form-select {
        border-radius: 10px !important;
        padding: 12px !important;
        transition: all 0.3s ease;
    }
    .form-control:focus {
        box-shadow: 0 0 10px rgba(13, 110, 253, 0.5);
        border-color: #0d6efd;
    }
    .card {
        animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
